name: Deploy Web To Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://dental-bot-web.unnita1235.workers.dev' }}
      NEXT_PUBLIC_SOCKET_URL: ${{ vars.NEXT_PUBLIC_SOCKET_URL || 'https://dental-bot-web.unnita1235.workers.dev' }}
      NEXT_PUBLIC_CLINIC_LOGO_DOMAIN: ${{ vars.NEXT_PUBLIC_CLINIC_LOGO_DOMAIN || 'localhost' }}
      API_URL: ${{ vars.API_URL || 'https://dental-bot-web.unnita1235.workers.dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build OpenNext bundle
        run: npx opennextjs-cloudflare build --dangerouslyUseUnsupportedNextVersion

      - name: Prepare Pages worker entrypoint
        run: |
          cp .open-next/worker.js .open-next/_worker.js

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .open-next --project-name autonomous-dental-appointment-bot --branch ${{ github.ref_name }} --commit-hash ${{ github.sha }} --commit-message "${{ github.event.head_commit.message || github.event.pull_request.title }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
